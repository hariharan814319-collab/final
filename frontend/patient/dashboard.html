<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>PHOENIX Patient Dashboard</title>

    <link rel="stylesheet"
        href="../css/style.css">

</head>

<body>

    <div class="orb orb-pink"></div>
    <div class="orb orb-blue"></div>
    <div class="orb orb-green"></div>

    <div class="dashboard-container">

        <!-- HEADER -->

        <div class="dashboard-header">

            <h1>
                Patient Dashboard
            </h1>

            <button
                type="button"
                id="logoutBtn"
                class="btn patient-btn">

                Logout

            </button>

        </div>

        <!-- PROFILE CARD -->

        <div class="dashboard-card stat-pink">

            <h2>
                My Profile
            </h2>

            <br>

            <img
                id="patientPhoto"
                src="../assets/default-user.png"
                class="profile-photo">

            <br><br>

            <h3 id="patientName">
                Loading...
            </h3>

            <p id="patientEmail">
                Loading...
            </p>

            <br>

            <div class="stats-box">

                <h3>
                    Total Appointments
                </h3>

                <p id="totalAppointments">
                    0
                </p>

            </div>

        </div>

        <!-- BOOK APPOINTMENT -->

        <div class="dashboard-card">

            <h2>
                Book Appointment
            </h2>

            <br>

            <label class="upload-label">Select Doctor</label>

            <select
                id="doctorSelect"
                class="glass-input">
                <option value="">Loading doctors...</option>
            </select>

            <br>

            <label class="upload-label">Appointment Date</label>

            <input
                type="date"
                id="appointmentDate"
                class="glass-input">

            <br>

            <label class="upload-label">Appointment Time</label>

            <input
                type="time"
                id="appointmentTime"
                class="glass-input">

            <br><br>

            <button
                type="button"
                id="bookBtn"
                class="btn patient-btn">

                Book Appointment

            </button>

        </div>

        <!-- APPOINTMENTS -->

        <div class="dashboard-card">

            <h2>
                My Appointments
            </h2>

            <br>

            <div id="appointmentsList">
                Loading appointments...
            </div>

        </div>

    </div>

    <script src="../js/config.js"></script>
    <script src="../js/patient.js"></script>

</body>

</html>
