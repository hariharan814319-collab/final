<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PHOENIX Admin Login</title>

    <link rel="stylesheet" href="../css/style.css">

</head>

<body>

    <div class="landing-container">

        <div class="glass-card form-card">

            <h1 class="logo small-logo">
                PHOENIX
            </h1>

            <p class="subtitle">
                Administrator Login
            </p>

            <div id="adminLoginSkeleton" class="skeleton" style="padding: 24px; border-radius: 22px;">
                <div class="skeleton skeleton-text" style="width: 160px; height: 28px; margin-bottom: 20px;"></div>
                <div class="skeleton skeleton-text" style="width: 100%; height: 50px; margin-bottom: 16px;"></div>
                <div class="skeleton skeleton-text" style="width: 100%; height: 50px; margin-bottom: 16px;"></div>
                <div class="skeleton skeleton-text" style="width: 110px; height: 44px; margin-top: 18px;"></div>
            </div>

            <form id="adminLoginForm" style="display:none;">

                <input
                    type="email"
                    id="adminEmail"
                    class="glass-input"
                    placeholder="Admin Email"
                    required>

                <br><br>

                <input
                    type="password"
                    id="adminPassword"
                    class="glass-input"
                    placeholder="Password"
                    required>

                <br><br>

                <button
                    type="submit"
                    class="btn">

                    LOGIN

                </button>

            </form>

        </div>

    </div>

    <script src="../js/config.js"></script>
    <script src="../js/admin.js"></script>

</body>

</html>
