<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
PHOENIX Doctor Registration
</title>

<link rel="stylesheet"
href="../css/style.css">

</head>

<body>

<div class="orb orb-pink"></div>
<div class="orb orb-blue"></div>
<div class="orb orb-green"></div>

<div class="landing-container">

<div class="glass-card form-card skeleton">

<h1 class="logo">
PHOENIX
</h1>

<p class="subtitle">
Doctor Registration
</p>

<div id="registerSkeleton" class="skeleton" style="padding: 28px; border-radius: 22px;">
    <div class="skeleton skeleton-text" style="width: 150px; height: 30px; margin-bottom: 20px;"></div>
    <div class="skeleton skeleton-text" style="width: 100%; height: 48px; margin-bottom: 14px;"></div>
    <div class="skeleton skeleton-text" style="width: 100%; height: 48px; margin-bottom: 14px;"></div>
    <div class="skeleton skeleton-text" style="width: 100%; height: 48px; margin-bottom: 14px;"></div>
    <div class="skeleton skeleton-text" style="width: 100%; height: 48px; margin-top: 16px;"></div>
</div>

<form id="doctorRegisterForm" style="display:none;">

<input
type="text"
id="name"
class="glass-input"
placeholder="Full Name"
required>

<br><br>

<input
type="email"
id="email"
class="glass-input"
placeholder="Email"
required>

<br><br>

<input
type="password"
id="password"
class="glass-input"
placeholder="Password"
required>

<br><br>

<input
type="text"
id="doctorName"
class="glass-input"
placeholder="Doctor Name"
required>

<br><br>

<input
type="text"
id="specialization"
class="glass-input"
placeholder="Specialization"
required>

<br><br>

<input
type="number"
id="experience"
class="glass-input"
placeholder="Experience"
required>

<br><br>

<input
type="number"
id="consultationFee"
class="glass-input"
placeholder="Consultation Fee"
required>

<br><br>

<input
type="text"
id="hospitalName"
class="glass-input"
placeholder="Hospital Name"
required>

<br><br>

<input
type="text"
id="medicalLicenseNumber"
class="glass-input"
placeholder="Medical License Number"
required>

<br><br>

<input
type="text"
id="aadhaarNumber"
class="glass-input"
placeholder="Aadhaar Number"
required>

<br><br>

<input
type="text"
id="availableDays"
class="glass-input"
placeholder="Monday,Wednesday,Friday"
required>

<br><br>

<input
type="text"
id="availableTime"
class="glass-input"
placeholder="10 AM - 4 PM"
required>

<br><br>

<button
type="submit"
class="btn doctor-btn">

Register

</button>

</form>

<br>

<a href="login.html">

Already Registered?
Login

</a>

</div>

</div>

<script src="../js/config.js"></script>
<script src="../js/doctor.js"></script>

</body>
</html>
